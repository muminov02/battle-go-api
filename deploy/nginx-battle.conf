# Battle test-server: serves the demo frontend AND proxies the Go API (same origin → no CORS).
# Install: copy to /etc/nginx/sites-available/battle, symlink to sites-enabled, set server_name, then:
#   nginx -t && systemctl reload nginx
# TLS: certbot --nginx -d battle.yourdomain.com   (then WS_PUBLIC_URL must be wss://battle.yourdomain.com)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name battle.yourdomain.com;        # <-- change to your test-server domain or _ for IP-only

    # Demo frontend (battle-test.html lives in /var/www/battle-go-api)
    root /var/www/battle-go-api;
    index battle-test.html;

    # WebSocket realtime endpoint (driver=ws). Needs upgrade headers.
    location = /student/v1/battle/ws {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;              # keep ws open
    }

    # REST API → Go service
    location /student/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Everything else = static (the demo page). Visit http://<host>/battle-test.html
    location / {
        try_files $uri $uri/ =404;
    }
}
