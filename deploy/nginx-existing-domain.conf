# Add these blocks INSIDE the existing `server { … }` for v2-backend-erp.englifyschool.com
# (the one already serving the Yii2 PHP app). They route specific paths to the Go
# service on 127.0.0.1:8080; everything else keeps hitting PHP.
#
# Requires: the Go api+worker running on the SAME host (127.0.0.1:8080). If Go runs
# on another box, replace 127.0.0.1 with that host's IP and open the port to nginx.
#
# Public path convention: https://v2-backend-erp.englifyschool.com/v2/battle/<endpoint>
#   /v2/battle/find          -> Go /student/v1/battle/find
#   /v2/battle/confirm        -> /student/v1/battle/confirm
#   /v2/battle/answer         -> /student/v1/battle/answer
#   /v2/battle/leave          -> /student/v1/battle/leave
#   /v2/battle/change-type    -> /student/v1/battle/change-type
#   /v2/battle/<uuid>         -> /student/v1/battle/<uuid>
#   /v2/battle/<uuid>/questions
#   /v2/battle/ws             -> /student/v1/battle/ws   (WebSocket)

# WebSocket (exact match first). Only ws requests hit this, so hardcoding the
# upgrade headers here is safe (no http{} map needed).
location = /v2/battle/ws {
    rewrite ^ /student/v1/battle/ws break;
    proxy_pass         http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 3600s;
}

# REST endpoints under /v2/battle/  ->  Go /student/v1/battle/
location /v2/battle/ {
    rewrite ^/v2/battle/(.*)$ /student/v1/battle/$1 break;
    proxy_pass         http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# OPTIONAL: also expose the native path so the bundled demo client (battle-test.html,
# which calls /student/v1/battle/...) works on this domain unchanged.
location = /student/v1/battle/ws {
    proxy_pass         http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 3600s;
}
location /student/v1/battle/ {
    proxy_pass         http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}
